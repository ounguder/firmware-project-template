name: CI

# Runs PlatformIO unit tests on every push and pull request.
# Tests run on the native (host) environment — no hardware required.
# Skips gracefully if platformio.ini has no configured platform (blank template,
# Makefile-based projects, or projects with no automated tests).

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    name: Unit Tests (native)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: ${{ runner.os }}-pio-${{ hashFiles('platformio.ini') }}
          restore-keys: |
            ${{ runner.os }}-pio-

      - name: Install PlatformIO
        run: pip install --upgrade platformio

      - name: Run unit tests (PlatformIO native)
        run: |
          # Only run if platformio.ini has a configured [env:native] platform
          if grep -qE '^platform\s*=' platformio.ini; then
            pio test -e native --verbose
          else
            echo "platformio.ini has no configured platform — skipping PlatformIO tests."
            echo "This project uses a custom build system or has no automated tests."
          fi
