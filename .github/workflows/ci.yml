name: CI

# Runs PlatformIO unit tests on every push and pull request.
# Tests run on the native (host) environment — no hardware required.
# Skips gracefully if platformio.ini has no configured platform (blank template,
# Makefile-based projects, or projects with no automated tests).

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    name: Unit Tests (native)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: ${{ runner.os }}-pio-${{ hashFiles('platformio.ini') }}
          restore-keys: |
            ${{ runner.os }}-pio-

      - name: Install PlatformIO
        run: pip install --upgrade platformio

      - name: Run unit tests (PlatformIO native)
        run: |
          # Only run if a real target platform is configured (not empty, not 'native')
          if grep -E '^platform\s*=' platformio.ini | grep -qvE '=\s*(native\s*)?$'; then
            pio test -e native --verbose
          else
            echo "No target platform configured in platformio.ini — skipping PlatformIO tests."
            echo "Fill in [env:target] platform to enable automated tests."
          fi
